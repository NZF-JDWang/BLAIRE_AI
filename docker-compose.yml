name: blaire

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blaire-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      DATABASE_URL: ${DATABASE_URL}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      SEARCH_MODE_DEFAULT: ${SEARCH_MODE_DEFAULT:-searxng_only}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      MCP_OBSIDIAN_URL: ${MCP_OBSIDIAN_URL}
      MCP_HA_URL: ${MCP_HA_URL}
      MODEL_GENERAL_DEFAULT: ${MODEL_GENERAL_DEFAULT:-qwen2.5:7b-instruct}
      MODEL_VISION_DEFAULT: ${MODEL_VISION_DEFAULT:-qwen2.5vl:7b}
      MODEL_EMBEDDING_DEFAULT: ${MODEL_EMBEDDING_DEFAULT:-nomic-embed-text:v1.5}
      MODEL_CODE_DEFAULT: ${MODEL_CODE_DEFAULT:-}
      REQUIRE_AUTH: ${REQUIRE_AUTH:-true}
      ADMIN_API_KEYS: ${ADMIN_API_KEYS}
      USER_API_KEYS: ${USER_API_KEYS}
    volumes:
      - ${DROP_FOLDER:-/srv/ai-knowledge/drop}:/app/knowledge/drop
      - ${OBSIDIAN_VAULT_PATH:-/srv/obsidian/BlacksiteLabVault}:/vault:rw
      - ${BACKUP_PATH:-/mnt/backups/blaire}:/backups
      - ${LOG_PATH:-./data/logs}:/app/logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - containers_core

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blaire-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:8000}
      FRONTEND_PROXY_API_KEY: ${FRONTEND_PROXY_API_KEY}
    command: npm run start
    depends_on:
      backend:
        condition: service_started
    networks:
      - containers_core

  postgres:
    image: postgres:16-alpine
    container_name: blaire-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blaire}
      POSTGRES_USER: ${POSTGRES_USER:-blaire}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${POSTGRES_DATA_PATH:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blaire} -d ${POSTGRES_DB:-blaire}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - containers_core

  qdrant:
    image: qdrant/qdrant:latest
    container_name: blaire-qdrant
    restart: unless-stopped
    env_file:
      - .env
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__LOG_LEVEL: ${QDRANT_LOG_LEVEL:-INFO}
    volumes:
      - ${QDRANT_STORAGE_PATH:-/srv/blacksitelab/blaire/qdrant}:/qdrant/storage
    networks:
      - containers_core

  searxng:
    image: searxng/searxng:latest
    container_name: blaire-searxng
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BASE_URL: ${SEARXNG_BASE_URL:-http://searxng:8080/}
      INSTANCE_NAME: ${SEARXNG_INSTANCE_NAME:-blaire-searxng}
      SEARXNG_REDIS_URL: ${SEARXNG_REDIS_URL:-}
    volumes:
      - ${SEARXNG_CONFIG_PATH:-./data/searxng}:/etc/searxng
    profiles:
      - search
    networks:
      - containers_core

networks:
  containers_core:
    name: containers_core
    driver: bridge
