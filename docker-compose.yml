name: blaire

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blaire-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      INFERENCE_BASE_URL: ${INFERENCE_BASE_URL:-http://localai:8080}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://vllm:8000}
      DATABASE_URL: ${DATABASE_URL}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      SEARCH_MODE_DEFAULT: ${SEARCH_MODE_DEFAULT:-searxng_only}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      MCP_OBSIDIAN_URL: ${MCP_OBSIDIAN_URL}
      MCP_HA_URL: ${MCP_HA_URL}
      MODEL_GENERAL_DEFAULT: ${MODEL_GENERAL_DEFAULT:-qwen3-vl:14b-q4_K_M}
      MODEL_VISION_DEFAULT: ${MODEL_VISION_DEFAULT:-qwen3-vl:14b-q4_K_M}
      MODEL_EMBEDDING_DEFAULT: ${MODEL_EMBEDDING_DEFAULT:-nomic-embed-text:v1.5}
      MODEL_CODE_DEFAULT: ${MODEL_CODE_DEFAULT:-}
      REQUIRE_AUTH: ${REQUIRE_AUTH:-true}
      ADMIN_API_KEYS: ${ADMIN_API_KEYS}
      USER_API_KEYS: ${USER_API_KEYS}
    volumes:
      - ${DROP_FOLDER:-/srv/ai-knowledge/drop}:/app/knowledge/drop
      - ${OBSIDIAN_VAULT_PATH:-/srv/obsidian/BlacksiteLabVault}:/vault:rw
      - ${BACKUP_PATH:-/mnt/backups/blaire}:/backups
      - ${LOG_PATH:-./data/logs}:/app/logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      localai:
        condition: service_started
      obsidian-mcp-server:
        condition: service_started
        required: false
      ha-mcp-server:
        condition: service_started
        required: false
    networks:
      - containers_core

  localai:
    image: localai/localai:latest-aio-cpu
    container_name: blaire-localai
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEBUG: ${LOCALAI_DEBUG:-false}
      MODELS_PATH: /models
    volumes:
      - ${LOCALAI_MODELS_PATH:-./data/localai/models}:/models
    networks:
      - containers_core

  vllm:
    image: vllm/vllm-openai:latest
    container_name: blaire-vllm
    restart: unless-stopped
    env_file:
      - .env
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen3-VL-14B}
      - --quantization
      - ${VLLM_QUANTIZATION:-nvfp4}
    profiles:
      - gpu
    networks:
      - containers_core

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blaire-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:8000}
      FRONTEND_PROXY_API_KEY: ${FRONTEND_PROXY_API_KEY}
    command: npm run start
    depends_on:
      backend:
        condition: service_started
    networks:
      - containers_core

  postgres:
    image: postgres:16-alpine
    container_name: blaire-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blaire}
      POSTGRES_USER: ${POSTGRES_USER:-blaire}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${POSTGRES_DATA_PATH:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blaire} -d ${POSTGRES_DB:-blaire}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - containers_core

  qdrant:
    image: qdrant/qdrant:latest
    container_name: blaire-qdrant
    restart: unless-stopped
    env_file:
      - .env
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__LOG_LEVEL: ${QDRANT_LOG_LEVEL:-INFO}
    volumes:
      - ${QDRANT_STORAGE_PATH:-/srv/blacksitelab/blaire/qdrant}:/qdrant/storage
    networks:
      - containers_core

  searxng:
    image: searxng/searxng:latest
    container_name: blaire-searxng
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BASE_URL: ${SEARXNG_BASE_URL:-http://searxng:8080/}
      INSTANCE_NAME: ${SEARXNG_INSTANCE_NAME:-blaire-searxng}
      SEARXNG_REDIS_URL: ${SEARXNG_REDIS_URL:-}
    volumes:
      - ${SEARXNG_CONFIG_PATH:-./data/searxng}:/etc/searxng
    profiles:
      - search
    networks:
      - containers_core

  obsidian-mcp-server:
    build:
      context: ./mcp-obsidian
    container_name: blaire-obsidian-mcp
    restart: unless-stopped
    volumes:
      - ${OBSIDIAN_VAULT_PATH:-/srv/obsidian/BlacksiteLabVault}:/vault:rw
    profiles:
      - mcp
    networks:
      - containers_core

  ha-mcp-server:
    build:
      context: ./mcp-ha
    container_name: blaire-ha-mcp
    restart: unless-stopped
    environment:
      HOME_ASSISTANT_URL: ${HOME_ASSISTANT_URL:-}
      HOME_ASSISTANT_TOKEN: ${HOME_ASSISTANT_TOKEN:-}
      HOME_ASSISTANT_VERIFY_TLS: ${HOME_ASSISTANT_VERIFY_TLS:-true}
    profiles:
      - mcp
    networks:
      - containers_core

  homelab-mcp:
    build:
      context: ./mcp-homelab
    container_name: blaire-homelab-mcp
    restart: unless-stopped
    environment:
      HOMELAB_ALLOWED_HTTP_HOSTS: ${HOMELAB_ALLOWED_HTTP_HOSTS:-}
    profiles:
      - mcp
    networks:
      - containers_core

  watchtower:
    image: containrrr/watchtower:latest
    container_name: blaire-watchtower
    restart: unless-stopped
    profiles:
      - ops
    command:
      - --interval
      - "86400"
      - --cleanup
      - --rolling-restart
      - blaire-backend
      - blaire-frontend
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - containers_core

networks:
  containers_core:
    name: containers_core
    driver: bridge
